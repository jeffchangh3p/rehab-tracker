# Render 部署設定 (Render deployment blueprint)
# 在 Render 建立 Blueprint 時會自動讀取這個檔案。
services:
  - type: web
    name: rehab-tracker
    runtime: python
    # 「starter」方案 ($7/月) 才支援 persistent disk，資料才不會在重啟時消失。
    # 若用免費方案：把下方 disk 區塊整段刪掉，並改用「設定 → 備份」定期匯出保存。
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      # 資料庫與上傳檔案都放在下面掛載的 disk 上
      - key: DATA_DIR
        value: /var/data
      # 用來簽署登入 cookie；Render 會自動產生一組
      - key: SECRET_KEY
        generateValue: true
      # 選填：設定一組密碼保護整個網站（醫療資料建議設定）。
      # 在 Render 後台 Environment 加上 APP_PASSWORD 即可啟用。
      # - key: APP_PASSWORD
      #   sync: false
    disk:
      name: rehab-data
      mountPath: /var/data
      sizeGB: 1
